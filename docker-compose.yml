version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: screenshot_okaimono_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: scshot_okaimono_development
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    command: bin/rails s -b 0.0.0.0 -p 3000
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  mysql_data: