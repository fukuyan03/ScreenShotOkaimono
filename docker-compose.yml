services:
  db:
    image: mysql:8.0
    container_name: screenshot_okaimono_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: scshot_okaimono_development
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build:
      context: .
      target: development
    command: bin/rails s -b 0.0.0.0 -p 3000
    working_dir: /rails
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: password
      DB_NAME_DEVELOPMENT: scshot_okaimono_development
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - .:/rails
    depends_on:
      - db

volumes:
  mysql_data:
